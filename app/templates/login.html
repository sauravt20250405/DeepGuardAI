{% extends "base.html" %}

{% block content %}
<div class="glass-panel" style="max-width: 450px; margin: 5rem auto; text-align: center;">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary); margin-bottom: 1.5rem;">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
    </svg>
    
    <h2 style="margin-bottom: 0.5rem;">Forensic Portal Login</h2>
    <p style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 2rem;">Authorized Investigative Personnel Only</p>

    <form action="{{ url_for('login') }}" method="POST" style="display: flex; flex-direction: column; gap: 1rem;">
        
        <input type="text" name="username" placeholder="Username" required 
               style="background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); padding: 1rem; border-radius: 8px; color: white; font-size: 1rem; outline: none;">
        
        <input type="password" name="password" placeholder="Password" required 
               style="background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); padding: 1rem; border-radius: 8px; color: white; font-size: 1rem; outline: none; margin-bottom: 1rem;">
        
        <button type="submit" class="btn-primary" style="width: 100%;">
            Sign In
        </button>
    </form>
    
    <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border-color);">
        <p style="color: var(--text-muted); font-size: 0.9rem;">
            Don't have an account? 
            <a href="{{ url_for('register') }}" style="color: var(--accent); text-decoration: none; font-weight: 600;">Create one</a>
        </p>
    </div>
</div>
{% endblock %}
