{% extends "base.html" %}

{% block content %}
<div class="glass-panel" style="max-width: 450px; margin: 5rem auto; text-align: center;">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--success); margin-bottom: 1.5rem;">
        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
        <circle cx="8.5" cy="7" r="4"></circle>
        <line x1="20" y1="8" x2="20" y2="14"></line>
        <line x1="23" y1="11" x2="17" y2="11"></line>
    </svg>
    
    <h2 style="margin-bottom: 0.5rem;">Create Investigator Account</h2>
    <p style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 2rem;">Register for access to the DeepGuard Forensic System</p>

    <form action="{{ url_for('register') }}" method="POST" style="display: flex; flex-direction: column; gap: 1rem;">
        
        <input type="text" name="username" placeholder="Choose a Username" required 
               style="background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); padding: 1rem; border-radius: 8px; color: white; font-size: 1rem; outline: none;">
        
        <input type="password" name="password" placeholder="Create Password (min 6 chars)" required 
               style="background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); padding: 1rem; border-radius: 8px; color: white; font-size: 1rem; outline: none;">
        
        <input type="password" name="confirm_password" placeholder="Confirm Password" required 
               style="background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); padding: 1rem; border-radius: 8px; color: white; font-size: 1rem; outline: none; margin-bottom: 1rem;">
        
        <button type="submit" class="btn-primary" style="width: 100%; background: linear-gradient(135deg, #10b981, #0ea5e9);">
            Create Account
        </button>
    </form>
    
    <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border-color);">
        <p style="color: var(--text-muted); font-size: 0.9rem;">
            Already registered? 
            <a href="{{ url_for('login') }}" style="color: var(--accent); text-decoration: none; font-weight: 600;">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
