{% extends "base.html" %}

{% block content %}
<div style="display: flex; justify-content: center; gap: 2rem; flex-wrap: wrap; margin-top: 3rem;">

    <!-- VIDEO UPLOAD -->
    <div class="glass-panel" style="flex: 1; max-width: 480px; text-align: center;">
        <h2 style="margin-bottom: 1.5rem;">🎬 Video Analysis</h2>
        <form action="{{ url_for('scan') }}" method="POST" enctype="multipart/form-data" style="display: flex; flex-direction: column; align-items: center; gap: 1.5rem;">
            <div class="upload-area" style="width: 100%;">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary);">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                    <circle cx="12" cy="13" r="4"></circle>
                </svg>
                <span style="color: var(--text-muted); font-size: 1rem; margin-top: 0.5rem;">Select Video(s) (.mp4)</span>
                <input type="file" name="video" accept=".mp4" required multiple class="native-file-input" id="video-input" onchange="previewVideo(event)">
            </div>

            <div id="video-preview-container" style="display: none; width: 100%;">
                <video id="video-preview" controls style="width: 100%; border-radius: 8px; max-height: 250px; background: #000;"></video>
            </div>

            <button type="submit" class="btn-primary" style="width: 100%;">🔍 Analyze Video</button>
        </form>
    </div>

    <!-- IMAGE UPLOAD -->
    <div class="glass-panel" style="flex: 1; max-width: 480px; text-align: center;">
        <h2 style="margin-bottom: 1.5rem;">🖼️ Image Analysis</h2>
        <form action="{{ url_for('scan_image') }}" method="POST" enctype="multipart/form-data" style="display: flex; flex-direction: column; align-items: center; gap: 1.5rem;">
            <div class="upload-area" style="width: 100%;">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent);">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                    <polyline points="21 15 16 10 5 21"></polyline>
                </svg>
                <span style="color: var(--text-muted); font-size: 1rem; margin-top: 0.5rem;">Select Image (JPG, PNG)</span>
                <input type="file" name="image" accept=".jpg,.jpeg,.png,.bmp,.webp" required class="native-file-input" id="image-input" onchange="previewImage(event)">
            </div>

            <div id="image-preview-container" style="display: none; width: 100%;">
                <img id="image-preview" style="width: 100%; border-radius: 8px; max-height: 250px; object-fit: contain; background: #000;">
            </div>

            <button type="submit" class="btn-primary" style="width: 100%; background: linear-gradient(135deg, #0ea5e9, #8b5cf6);">🔍 Analyze Image</button>
        </form>
    </div>
</div>

<script>
function previewVideo(event) {
    const file = event.target.files[0];
    if (file) {
        const video = document.getElementById('video-preview');
        video.src = URL.createObjectURL(file);
        document.getElementById('video-preview-container').style.display = 'block';
    }
}
function previewImage(event) {
    const file = event.target.files[0];
    if (file) {
        const img = document.getElementById('image-preview');
        img.src = URL.createObjectURL(file);
        document.getElementById('image-preview-container').style.display = 'block';
    }
}
</script>
{% endblock %}
